# [scaffold] CI workflow | Date: 2026-05-19 | Description: lint + test + coverage + gitleaks + npm audit（AA-SEAC §1.2 / §1.6 / OWASP A06）
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Daily dependency advisory sweep: 03:17 UTC (≈ 11:17 Asia/Shanghai)
    - cron: '17 3 * * *'

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # better-sqlite3 prebuilt binary on ubuntu-latest + Node 20 出现 CHECK 约束不强制的怪行为；
      # 强制从源码编译规避 prebuilt 怪态（增加 30-60s CI 时间，换确定性）。
      - name: Rebuild better-sqlite3 from source
        run: npm rebuild better-sqlite3 --build-from-source

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test with coverage
        run: npm run test:coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  test-postgres:
    name: PG Integration (postgres:16)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # V1.5-A.3：真 PG 验收 job
    # - 默认 SQLite job 路径完全不动；本 job 独立给 PG 路径一个失败可见性独立的信号
    # - 注入 PG_TEST_URL 后，npm test 会 unskip tests/integration/postgresAdapter.integration.test.js
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      PG_TEST_URL: postgres://postgres:postgres@localhost:5432/postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # 与 lint-and-test 一致：强制源码编译规避 better-sqlite3 prebuilt 怪行为
      - name: Rebuild better-sqlite3 from source
        run: npm rebuild better-sqlite3 --build-from-source

      - name: Test (SQLite default 482 + PG integration 9 全跑)
        run: npm test

  test-redis:
    name: Redis Queue Integration (redis:7)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # V1.5-B：真 BullMQ + Redis 验收 job（与 test-postgres 平行）
    # - 默认 SQLite/内存队列 job 路径完全不动；本 job 独立给 BullMQ 路径一个失败可见性独立的信号
    # - 注入 REDIS_TEST_URL 后，npm test 会 unskip tests/integration/bullmqQueue.integration.test.js
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      REDIS_TEST_URL: redis://localhost:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # 与 lint-and-test 一致：强制源码编译规避 better-sqlite3 prebuilt 怪行为
      - name: Rebuild better-sqlite3 from source
        run: npm rebuild better-sqlite3 --build-from-source

      - name: Test (SQLite 默认 + Redis 集成 unskip)
        run: npm test

  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 用官方 gitleaks 二进制 + --no-git 扫工作目录，避免 gitleaks-action
      # 在首次推送完整历史 / schedule 触发下 commit range 解析失败的边界问题
      - name: Install gitleaks
        run: |
          VERSION=8.18.4
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan working tree
        run: gitleaks detect --source . --no-git --verbose --redact

  dependency-audit:
    name: Dependency Audit (npm audit)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: npm audit (production, high+)
        run: npm run audit:ci

      - name: Generate audit.json on failure
        if: failure()
        run: npm audit --json > audit.json || true

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit-report
          path: audit.json
          retention-days: 7
          if-no-files-found: ignore
